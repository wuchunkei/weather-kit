name: 'ďŁż iRingo: đźŚ¤ ďŁżWeatherKit'
description: |-
  iOS 18 & macOS 15 & watchOS 11
  1. Unlock all Weather features
  2. Add AQI replacement with IQAir, QWeather, and WAQI fallback support
  3. Add next-hour precipitation data
  4. Add weather data replacement
  5. Fall back from OpenWeather to WeatherKit or QWeather when OpenWeather is unavailable

  Open-source derivative notice: This project is a secondary creation and functional extension based on NSRingo/WeatherKit and related open-source work. It is intended for learning, research, and personal use only. WeatherKit, Apple, OpenWeather, QWeather, IQAir, WAQI, Hong Kong Observatory, and related data, trademarks, and services belong to their respective rights holders. Users should comply with applicable service terms and local laws.
compat_arguments:
  Weather.Replace: OFF
  Weather.Provider: WeatherKit
  Weather.Fallback.Provider: WeatherKit
  NextHour.Provider: WeatherKit
  NextHour.Fallback.Provider: WeatherKit
  AirQuality.Replace: CN
  AirQuality.Provider: WeatherKit
  AirQuality.Pollutants.Provider: Auto
  AirQuality.Standard: Provider
  AirQuality.RequestTimeout: '3000'
  AirQuality.Fallback.Provider: QWeather,WAQI
  API.OpenWeather.URL: https://api.openweathermap.org/data/4.0/onecall
  API.OpenWeather.Token: ''
  API.QWeather.Host: devapi.qweather.com
  API.QWeather.Token: ''
  API.IQAir.URL: https://api.airvisual.com/v2/nearest_city
  API.IQAir.Token: ''
  API.WAQI.Token: ''
  Storage: Argument
  LogLevel: WARN
compat_arguments_desc: |
  Weather.Replace: [Weather] Replacement Scope
      â”ś OFF: Disabled
      â”ś CN: Mainland China
      â”ś CN|HK|MO|TW: Mainland China, Hong Kong, Macau, and Taiwan
      â”” .*: All Regions
  Replace weather data only for matching regions. Keep Disabled when you only need AQI replacement.

  Weather.Provider: [Weather] Data Source
      â”ś WeatherKit: WeatherKit (No replacement)
      â”ś OpenWeather: OpenWeather
      â”” QWeather: QWeather
  Use the selected provider to replace weather data.

  Weather.Fallback.Provider: [Weather] OpenWeather Fallback
      â”ś WeatherKit: WeatherKit
      â”” QWeather: QWeather
  Fallback provider used when OpenWeather weather data is unavailable or rate-limited.

  NextHour.Provider: [Next-Hour Precipitation Intensity] Data Source
      â”ś WeatherKit: WeatherKit (Do not add)
      â”ś OpenWeather: OpenWeather
      â”” QWeather: QWeather
  Use the selected provider to replace or fill next-hour precipitation intensity data.

  NextHour.Fallback.Provider: [Next-Hour Precipitation Intensity] OpenWeather Fallback
      â”ś WeatherKit: WeatherKit
      â”” QWeather: QWeather
  Fallback provider used when OpenWeather next-hour precipitation data is unavailable or rate-limited.

  AirQuality.Replace: [Air Quality] Replacement Scope
      â”ś CN: Mainland China
      â”ś CN|HK|MO|TW: Mainland China, Hong Kong, Macau, and Taiwan
      â”” .*: All Regions
  Replace air-quality data only for matching regions.

  AirQuality.Provider: [Air Quality] Data Source
      â”ś WeatherKit: WeatherKit (No replacement)
      â”ś IQAir: IQAir
      â”ś QWeather: QWeather
      â”” WAQI: WAQI
  Use the selected provider to replace AQI. IQAir results can be supplemented by the configured fallback providers when pollutant details are missing.

  AirQuality.Pollutants.Provider: [Air Quality] Pollutants Source
      â”ś Auto: Auto
      â”ś IndexProvider: Same as AQI Source
      â”ś WeatherKit: WeatherKit
      â”ś IQAir: IQAir
      â”ś QWeather: QWeather
      â”” WAQI: WAQI
  Choose where pollutant concentrations come from. Auto keeps the AQI source's own pollutants, preserves WeatherKit pollutants when available, and tries QWeather/IQAir when pollutant details are missing.

  AirQuality.Standard: [Air Quality] AQI Standard
      â”ś Provider: Provider Default
      â”ś US: US AQI (EPA NowCast)
      â”” CN: China AQI (HJ 633-2012)
  Choose the AQI standard used for display. Provider Default keeps the selected provider's own AQI; US or China recalculates AQI from pollutant concentrations when available.

  AirQuality.RequestTimeout: [Air Quality] Request Timeout
  Maximum wait time in milliseconds for each third-party AQI provider before falling back or keeping the original WeatherKit response. Use 3000 for normal use, or 5000 when QWeather/IQAir is slow.

  AirQuality.Fallback.Provider: [Air Quality] Fallback Sources
      â”ś QWeather: QWeather
      â”” WAQI: WAQI
  Fallback order used when the primary AQI provider is unavailable. Pollutant details are fetched from fallback providers only when a forced AQI standard needs them.

  API.OpenWeather.URL: [API] OpenWeather Request URL
  OpenWeather One Call API 4.0 request URL

  API.OpenWeather.Token: [API] OpenWeather Token
  OpenWeather API token

  API.QWeather.Host: [API] QWeather Host
  Hostname used by the QWeather API

  API.QWeather.Token: [API] QWeather Token
  QWeather API token

  API.IQAir.URL: [API] IQAir Request URL
  IQAir AirVisual API request URL

  API.IQAir.Token: [API] IQAir Token
  IQAir AirVisual API token

  API.WAQI.Token: [API] WAQI Token
  WAQI API token. Leave empty to let the script try the public nearest-station flow.

  Storage: [Storage] Configuration Type
      â”ś Argument: Prefer configuration passed by $argument, such as plugin options and module arguments. Missing $argument values are provided by PersistentStore (BoxJs).
      â”ś PersistentStore: Only use configuration from $persistentStore, such as BoxJs.
      â”” database: Only use defaults from the author's database.mjs file. Other custom configuration will no longer take effect.
  Choose the configuration source. For legacy setups without this option, the order remains $persistentStore (BoxJs) > $argument > database.

  LogLevel: [Debug] Log Level
      â”ś OFF: Off
      â”ś ERROR: Error
      â”ś WARN: Warning
      â”ś INFO: Info
      â”ś DEBUG: Debug
      â”” ALL: All
  Choose the script log level. Logs below the selected level will be suppressed.
open_url: http://boxjs.com/#/app/iRingo.WeatherKit
author: VirgilClyne[https://github.com/VirgilClyne],WordlessEcho[https://github.com/WordlessEcho],001[https://github.com/001ProMax],wuchunkei[https://github.com/wuchunkei]
