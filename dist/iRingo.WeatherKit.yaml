icon: https://developer.apple.com/assets/elements/icons/weatherkit/weatherkit-128x128.png
dns: {}
rules:
- domain:
    match: weather-analytics-events.apple.com
    policy: REJECT-DROP
- domain_suffix:
    match: tthr.apple.com
    policy: REJECT-DROP
- domain:
    match: tether.edge.apple
    policy: REJECT-DROP
- and:
    match:
    - or:
        match:
        - asn:
            match: '714'
            no_resolve: true
        - asn:
            match: '6185'
            no_resolve: true
    - protocol:
        match: QUIC
    policy: REJECT-DROP
